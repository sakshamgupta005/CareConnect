services:
  - type: web
    name: careconnect-backend-saksham
    runtime: node
    plan: free
    buildCommand: npm ci
    startCommand: npm run dev -- --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/reports
    envVars:
      - key: NODE_ENV
        value: production
      - key: DISABLE_HMR
        value: "true"
